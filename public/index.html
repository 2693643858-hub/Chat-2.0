<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Chat</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="auth-screen" id="authScreen">
      <form class="auth-card" id="authForm">
        <div class="auth-brand">
          <img class="app-icon" src="/icon.svg" alt="Codex Chat" />
          <div>
            <h1>Codex Chat</h1>
            <p>登录后继续聊天</p>
          </div>
        </div>

        <div class="segmented auth-tabs" role="tablist" aria-label="账号操作">
          <button class="active" type="button" data-auth-mode="login">登录</button>
          <button type="button" data-auth-mode="register">注册</button>
        </div>

        <label class="field">
          <span id="authUsernameLabel">邮箱或用户名</span>
          <input id="authUsername" name="username" autocomplete="username" required />
        </label>

        <label class="field register-only">
          <span>邮箱</span>
          <input id="authEmail" name="email" type="email" autocomplete="email" />
        </label>

        <label class="field register-only">
          <span>昵称</span>
          <input id="authDisplayName" name="displayName" autocomplete="nickname" />
        </label>

        <label class="field">
          <span>密码</span>
          <input id="authPassword" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button class="primary-button" id="authSubmit" type="submit">登录</button>
        <p class="auth-note" id="authNote">演示账号：iwen / 123456</p>
        <p class="form-message" id="authMessage" role="status"></p>
      </form>
    </section>

    <main class="shell" id="appShell" aria-label="聊天应用" hidden>
      <aside class="sidebar" aria-label="侧边栏">
        <section class="profile-bar">
          <button class="avatar avatar-user avatar-button" id="profileButton" type="button" title="编辑个人资料" aria-label="编辑个人资料">
            <span id="currentUserAvatar">IW</span>
          </button>
          <div>
            <h1><img class="title-icon" src="/icon.svg" alt="" aria-hidden="true" />Codex Chat</h1>
            <p id="currentUserName">正在连接</p>
          </div>
          <button class="icon-button" id="logoutButton" type="button" title="退出登录" aria-label="退出登录">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
          </button>
        </section>

        <label class="search-box" for="searchInput">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="搜索会话或好友" autocomplete="off" />
        </label>

        <div class="segmented workspace-tabs" role="tablist" aria-label="工作区">
          <button class="active" id="chatsTab" type="button" data-view="chats">会话</button>
          <button id="friendsTab" type="button" data-view="friends">好友</button>
        </div>

        <nav class="conversation-list" id="conversationList" aria-label="最近聊天"></nav>

        <section class="friends-panel" id="friendsPanel" aria-label="好友" hidden>
          <form class="friend-form" id="friendForm">
            <input id="friendInput" placeholder="输入用户名添加好友" autocomplete="off" />
            <button class="primary-button compact" type="submit">添加</button>
          </form>

          <form class="group-form" id="groupForm">
            <h3 class="section-title">创建群聊</h3>
            <input id="groupNameInput" placeholder="群名称" autocomplete="off" />
            <input id="groupMembersInput" placeholder="好友用户名，用逗号分隔" autocomplete="off" />
            <button class="secondary-button" type="submit">创建群聊</button>
          </form>

          <div class="request-list" id="incomingRequests"></div>
          <div class="friend-list" id="friendList"></div>
          <div class="request-list" id="outgoingRequests"></div>
          <p class="form-message" id="friendMessage" role="status"></p>
        </section>
      </aside>

      <section class="chat-panel" aria-label="聊天窗口">
        <header class="chat-header">
          <button class="icon-button back-button" id="backButton" type="button" title="返回会话列表" aria-label="返回会话列表">
            <span aria-hidden="true">‹</span>
          </button>
          <div class="avatar" id="activeAvatar">CC</div>
          <div class="chat-title">
            <h2 id="activeName">选择一个会话</h2>
            <p id="activeStatus">消息会显示在这里</p>
          </div>
          <div class="header-actions" aria-label="聊天操作">
            <button class="icon-button" id="pinConversationButton" type="button" title="置顶聊天" aria-label="置顶聊天">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 17v5" />
                <path d="M5 17h14" />
                <path d="M7 9l5-6 5 6" />
                <path d="M8 9h8l-1 8H9L8 9Z" />
              </svg>
            </button>
            <button class="icon-button" id="muteConversationButton" type="button" title="免打扰" aria-label="免打扰">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                <path d="M3 3l18 18" />
              </svg>
            </button>
            <span class="connection-pill" id="connectionState">离线</span>
          </div>
        </header>

        <div class="message-stream" id="messageStream" aria-live="polite"></div>
        <div class="typing-indicator" id="typingIndicator" hidden></div>

        <form class="composer" id="messageForm">
          <button class="icon-button" id="attachmentButton" type="button" title="添加附件" aria-label="添加附件">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 1 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.82-2.83l8.48-8.48" />
            </svg>
          </button>
          <input id="attachmentInput" type="file" hidden />
          <textarea id="messageInput" rows="1" placeholder="输入消息" autocomplete="off"></textarea>
          <button class="send-button" id="sendButton" type="submit">发送</button>
          <div class="attachment-chip" id="attachmentPreview" hidden></div>
        </form>
      </section>
    </main>

    <section class="modal" id="profileModal" hidden>
      <form class="modal-panel" id="profileForm">
        <header class="modal-header">
          <div>
            <h2>个人资料</h2>
            <p>同步到云端，好友能看到你的公开资料</p>
          </div>
          <button class="icon-button" id="profileCloseButton" type="button" title="关闭" aria-label="关闭">
            <span aria-hidden="true">×</span>
          </button>
        </header>

        <div class="profile-grid">
          <label class="field">
            <span>头像文字</span>
            <input id="profileAvatar" maxlength="8" />
          </label>
          <label class="field">
            <span>昵称</span>
            <input id="profileDisplayName" maxlength="32" required />
          </label>
          <label class="field span-2">
            <span>个性签名</span>
            <input id="profileBio" maxlength="160" placeholder="写一句状态签名" />
          </label>
          <label class="field">
            <span>状态</span>
            <select id="profileStatus">
              <option value="online">在线</option>
              <option value="away">离开</option>
              <option value="dnd">勿扰</option>
              <option value="offline">离线</option>
            </select>
          </label>
          <label class="field">
            <span>性别</span>
            <select id="profileGender">
              <option value="unspecified">不展示</option>
              <option value="female">女</option>
              <option value="male">男</option>
              <option value="nonbinary">非二元</option>
            </select>
          </label>
          <label class="field">
            <span>生日</span>
            <input id="profileBirthday" type="date" />
          </label>
          <label class="field">
            <span>个人主页</span>
            <input id="profileHomepage" maxlength="180" placeholder="https://..." />
          </label>
        </div>

        <p class="form-message" id="profileMessage" role="status"></p>
        <button class="primary-button" type="submit">保存资料</button>
      </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/runtime-config.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
